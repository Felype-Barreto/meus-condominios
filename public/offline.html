<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C5C3E" />
    <title>Meus Condomínios offline</title>
    <style>
      :root {
        color: #111827;
        background: #f5efe6;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 420px);
        border: 1px solid #e7dccb;
        border-radius: 18px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
      }
      .mark {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #7c5c3e;
        color: #fff;
        font-weight: 800;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 1.55rem;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.6;
      }
      button {
        width: 100%;
        min-height: 46px;
        margin-top: 22px;
        border: 0;
        border-radius: 12px;
        background: #7c5c3e;
        color: #fff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">M</div>
      <h1>Você está offline</h1>
      <p>
        O Meus Condomínios protege os dados do condomínio e não salva informações internas
        no cache. Reconecte para acessar o painel.
      </p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
